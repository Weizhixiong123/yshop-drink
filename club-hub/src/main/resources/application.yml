server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/club_hub?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: club-hub-secret-key-change-this-in-production-2024
  expiration: 86400000  # 24小时

# 店东后台账号配置
owner:
  account:
    username: admin
    password: admin123admin
    name: 店东

# 微信小程序手机号登录配置
